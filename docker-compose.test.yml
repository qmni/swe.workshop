services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: workshop
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d workshop"]
      interval: 2s
      timeout: 3s
      retries: 20

  test:
    image: golang:1.22-alpine
    working_dir: /src
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
    environment:
      RUN_INTEGRATION: 1
      DB_HOST: test-db
      DB_PORT: 5432
      DB_USER: workshop
      DB_PASSWORD: workshop
      DB_NAME: workshop
      DB_SSLMODE: disable
    command: go test ./...
    depends_on:
      test-db:
        condition: service_healthy

volumes:
  go-mod-cache:
