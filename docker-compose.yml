services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: player
      POSTGRES_PASSWORD: p
      POSTGRES_DB: player
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U player -d player"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: player
      DB_PASSWORD: p
      DB_NAME: player
      DB_SSLMODE: disable
      PORT: 8080
      # Optional: Keycloak-JWT-Validierung aktivieren.
      # host.docker.internal zeigt aus dem Container auf den Host,
      # wo Keycloak (docker-compose.keycloak.yml) auf Port 8880 laeuft.
      KEYCLOAK_JWKS_URL: http://host.docker.internal:8880/realms/swe-workshop/protocol/openid-connect/certs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
